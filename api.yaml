openapi: 3.0.0
info:
  title: Dice Duel API
  version: 1.1.0
  description: API for multiplayer dice game with round-based mechanics

servers:
  - url: http://localhost:3000/api

paths:

  /players:
    post:
      summary: Create player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlayerRequest'
      responses:
        '201':
          description: Player created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Player'
    get:
      summary: Get all players
      responses:
        '200':
          description: List of players
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerList'

  /players/{playerId}:
    get:
      summary: Get player
      parameters:
        - $ref: '#/components/parameters/playerId'
      responses:
        '200':
          description: Player found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Player'

  /players/{playerId}/stats:
    get:
      summary: Get player stats
      parameters:
        - $ref: '#/components/parameters/playerId'
      responses:
        '200':
          description: Player stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerStats'

  /players/{playerId}/abilities:
    get:
      summary: Get player abilities
      parameters:
        - $ref: '#/components/parameters/playerId'
      responses:
        '200':
          description: Player abilities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbilityList'

  /players/{playerId}/avatar:
    post:
      summary: Upload avatar
      parameters:
        - $ref: '#/components/parameters/playerId'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded

  /matches:
    post:
      summary: Create match
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMatchRequest'
      responses:
        '201':
          description: Match created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Match'
    get:
      summary: Get matches (optional filter)
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/MatchStatus'
      responses:
        '200':
          description: Match list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchList'

  /matches/{matchId}:
    get:
      summary: Get match
      parameters:
        - $ref: '#/components/parameters/matchId'
      responses:
        '200':
          description: Match found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Match'

  /matches/{matchId}/join:
    post:
      summary: Join match
      parameters:
        - $ref: '#/components/parameters/matchId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [playerId]
              properties:
                playerId:
                  type: string
      responses:
        '200':
          description: Player joined

  /matches/{matchId}/start:
    post:
      summary: Start match
      parameters:
        - $ref: '#/components/parameters/matchId'
      responses:
        '200':
          description: Match started

  /matches/{matchId}/state:
    get:
      summary: Get match state
      parameters:
        - $ref: '#/components/parameters/matchId'
      responses:
        '200':
          description: Match state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchState'

  /matches/{matchId}/rounds/{roundId}:
    get:
      summary: Get round
      parameters:
        - $ref: '#/components/parameters/matchId'
        - $ref: '#/components/parameters/roundId'
      responses:
        '200':
          description: Round data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Round'

  /matches/{matchId}/rounds/{roundId}/roll:
    post:
      summary: Roll dice
      parameters:
        - $ref: '#/components/parameters/matchId'
        - $ref: '#/components/parameters/roundId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                playerId:
                  type: string
      responses:
        '200':
          description: Dice rolled

  /matches/{matchId}/rounds/{roundId}/lock:
    post:
      summary: Lock dice
      parameters:
        - $ref: '#/components/parameters/matchId'
        - $ref: '#/components/parameters/roundId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                playerId:
                  type: string
                lockedIndexes:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Dice locked

  /matches/{matchId}/rounds/{roundId}/resolve:
    post:
      summary: Resolve round
      parameters:
        - $ref: '#/components/parameters/matchId'
        - $ref: '#/components/parameters/roundId'
      responses:
        '200':
          description: Round resolved

  /abilities:
    get:
      summary: Get abilities
      responses:
        '200':
          description: Ability list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbilityList'

  /matches/{matchId}/rounds/{roundId}/abilities/activate:
    post:
      summary: Activate ability
      parameters:
        - $ref: '#/components/parameters/matchId'
        - $ref: '#/components/parameters/roundId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [playerId, abilityId]
              properties:
                playerId:
                  type: string
                abilityId:
                  type: string
                targetId:
                  type: string
      responses:
        '200':
          description: Ability activated

  /matches/{matchId}/replay/export:
    get:
      summary: Export replay
      parameters:
        - $ref: '#/components/parameters/matchId'
      responses:
        '200':
          description: Replay file

  /ability-packs/import:
    post:
      summary: Import ability pack
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Ability pack imported

components:

  parameters:
    playerId:
      name: playerId
      in: path
      required: true
      schema:
        type: string

    matchId:
      name: matchId
      in: path
      required: true
      schema:
        type: string

    roundId:
      name: roundId
      in: path
      required: true
      schema:
        type: string

  schemas:

    MatchStatus:
      type: string
      enum: [WAITING, READY, IN_PROGRESS, FINISHED]

    RoundStatus:
      type: string
      enum: [INITIALIZED, ROLLING, TARGET_SELECTION, ABILITY_PHASE, RESOLVED]

    DiceFace:
      type: string
      enum: [ATTACK, SHIELD, STEAL]

    Player:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        hearts:
          type: integer
        tokens:
          type: integer

    PlayerList:
      type: array
      items:
        $ref: '#/components/schemas/Player'

    PlayerStats:
      type: object
      properties:
        wins:
          type: integer
        losses:
          type: integer

    CreatePlayerRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    Match:
      type: object
      properties:
        id:
          type: string
        status:
          $ref: '#/components/schemas/MatchStatus'
        players:
          type: array
          items:
            $ref: '#/components/schemas/Player'

    MatchList:
      type: array
      items:
        $ref: '#/components/schemas/Match'

    MatchState:
      type: object
      properties:
        currentRound:
          type: integer
        players:
          type: array
          items:
            $ref: '#/components/schemas/Player'

    CreateMatchRequest:
      type: object
      properties:
        hostPlayerId:
          type: string
        maxPlayers:
          type: integer

    Round:
      type: object
      properties:
        id:
          type: string
        status:
          $ref: '#/components/schemas/RoundStatus'
        dice:
          type: array
          items:
            $ref: '#/components/schemas/DiceFace'
        locked:
          type: array
          items:
            type: boolean

    Ability:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        cost:
          type: integer

    AbilityList:
      type: array
      items:
        $ref: '#/components/schemas/Ability'